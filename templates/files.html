<!DOCTYPE html>
<html>
<head>
    <title>Your Files</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container{
            width: 600px;
            margin: 100px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        ul{
            list-style-type: none;
            padding: 0;
        }

        li{
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        a{
            text-decoration: none;
        }

        .btn{
            display: inline-block;
            padding: 8px 15px;
            border: 1px solid gray;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Your Uploaded Files 📂</h2>

    <a href="/logout">Logout</a>

    <br><br>

    <ul>
        {% for file in files %}
        <li>
            {{ file }}
            |
            <a href="/download/{{ file }}">Download</a>
        </li>
        {% endfor %}
    </ul>

    <br>

    <a href="/upload" class="btn">Upload New File</a>

</div>

</body>
</html>
